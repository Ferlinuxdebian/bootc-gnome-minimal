name: Build and Push bootc-gnome-minimal

on:
  schedule:
    - cron: '30 15 * * *' # Executa às 12:30 BRT
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Necessário se optar por usar assinatura com cosign futuramente

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Gera as tags automaticamente (Prática Bluefin: mantém latest e cria tag por data)
      - name: Generate Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,format=short

      # Login automático no GitHub Packages usando o token nativo do fluxo
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build e Push otimizados com cache nativo do GitHub Actions
      - name: Build and Push Image
        id: push-step
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Envio de notificação para o Telegram em caso de Sucesso
      - name: Telegram Notification (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Imagem bootc-gnome-minimal compilada com sucesso!
            
            Repositório: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Tags geradas: 
            - latest
            - ${{ steps.meta.outputs.version }}

      # Envio de notificação para o Telegram em caso de Falha
      - name: Telegram Notification (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Erro na compilação da imagem bootc-gnome-minimal!
            
            Verifique os logs em: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}