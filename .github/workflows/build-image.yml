name: Build e Push da Imagem Bootc
on:
  schedule:
    - cron: '30 15 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ferlinuxdebian/bootc-gnome-minimal
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Liberar espaço em disco
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Gerar metadados do build
        id: meta
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 2 | tail -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          DATE=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PRIMARY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${DATE}"
          TIMESTAMP=$(git log -1 --format=%ct)

          echo "version=${VERSION}"     >> $GITHUB_OUTPUT
          echo "date=${DATE}"           >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "primary=${PRIMARY}"     >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build, push e tags via container Fedora (buildah atual)
        run: |
          docker run --rm --privileged \
            -v "$(pwd):/workspace" \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e GITHUB_ACTOR="${{ github.actor }}" \
            -e REGISTRY="${{ env.REGISTRY }}" \
            -e IMAGE_NAME="${{ env.IMAGE_NAME }}" \
            -e PRIMARY="${{ steps.meta.outputs.primary }}" \
            -e VERSION="${{ steps.meta.outputs.version }}" \
            -e SHORT_SHA="${{ steps.meta.outputs.short_sha }}" \
            -e TIMESTAMP="${{ steps.meta.outputs.timestamp }}" \
            quay.io/fedora/fedora:42 \
            bash -c '
              set -euo pipefail
              dnf install -y buildah skopeo

              # Configuração necessária para permitir overlays dentro do container
              mkdir -p /var/lib/containers/storage
              
              echo "$GITHUB_TOKEN" | buildah login -u "$GITHUB_ACTOR" --password-stdin "$REGISTRY"

              buildah build \
                --storage-driver overlay \
                --skip-unused-stages=false \
                --security-opt label=disable \
                --source-date-epoch "$TIMESTAMP" \
                --rewrite-timestamp \
                --build-arg SOURCE_DATE_EPOCH="$TIMESTAMP" \
                -t "$PRIMARY" \
                -f Containerfile \
                -v "$(pwd):/run/src" \
                .

              buildah push "$PRIMARY"

              for TAG in "${VERSION}-latest" "latest" "main" "sha-${SHORT_SHA}"; do
                echo "→ Copiando manifesto para :${TAG}"
                skopeo copy \
                  --src-creds  "$GITHUB_ACTOR:$GITHUB_TOKEN" \
                  --dest-creds "$GITHUB_ACTOR:$GITHUB_TOKEN" \
                  "docker://$PRIMARY" \
                  "docker://$REGISTRY/$IMAGE_NAME:$TAG"
              done
            '

      - name: Notificar no Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅ Rebuild Concluído!' || '❌ Erro no Rebuild!' }}
            📦 Base: ${{ steps.meta.outputs.version }}
            🏷️ Tag: ${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.date }}
            🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}