name: Build e Push da Imagem Bootc (Chunkah Splitter)

on:
  schedule:
    - cron: '45 6 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Versão da Imagem Base
        id: base_version
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Gerar Timestamp e Tags
        id: vars
        run: |
          TIMESTAMP=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')
          VERSION=${{ steps.base_version.outputs.version }}
          echo "tag_full=${VERSION}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "tag_latest=${VERSION}-latest" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        run: |
          podman login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Build da Imagem Customizada (Temporária)
        run: |
          # Build da imagem base antes do split
          buildah build -t localhost/temp-image:latest -f ./Containerfile .

      - name: Otimização com Chunkah (Splitter)
        run: |
          # Define a imagem de origem para o splitter
          IMG="localhost/temp-image:latest"
          
          # Executa o buildah usando o Containerfile.splitter remoto
          # Isso divide a imagem em chunks otimizados
          buildah build \
            --skip-unused-stages=false \
            --from $IMG \
            --build-arg CHUNKAH_CONFIG_STR="$(podman inspect $IMG)" \
            -t localhost/optimized-image:latest \
            https://github.com/coreos/chunkah/releases/download/v0.5.0/Containerfile.splitter

      - name: Push das Imagens Otimizadas
        run: |
          DEST_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          
          # Tag e Push: Versão Datada
          podman tag localhost/optimized-image:latest "${DEST_BASE}:${{ steps.vars.outputs.tag_full }}"
          podman push "${DEST_BASE}:${{ steps.vars.outputs.tag_full }}"
          
          # Tag e Push: Versão Latest
          podman tag localhost/optimized-image:latest "${DEST_BASE}:${{ steps.vars.outputs.tag_latest }}"
          podman push "${DEST_BASE}:${{ steps.vars.outputs.tag_latest }}"

      - name: Notificar Sucesso no Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Bootc Otimizado (Chunkah) concluído!
            Base: ${{ steps.base_version.outputs.version }}
            Tag: ${{ steps.vars.outputs.tag_full }}
            Status: Camadas processadas via Containerfile.splitter.

      - name: Notificar Falha no Telegram
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Erro no Rebuild (Chunkah Splitter)!
            Workflow: ${{ github.run_id }}
