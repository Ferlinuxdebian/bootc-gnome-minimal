name: Build e Push da Imagem Bootc
on:
  schedule:
    # Dispara as 03h45 diariamente (horário de Brasília)
    - cron: '45 6 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Extrair Versão da Imagem Base
        id: base_version
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Gerar Timestamp (Horário de Brasília)
        id: timestamp
        run: echo "date=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry via Buildah
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo buildah login \
            -u ${{ github.actor }} \
            --password-stdin \
            ${{ env.REGISTRY }}

      - name: Extrair metadados (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build da Imagem com Buildah
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.base_version.outputs.version }}"
          DATE="${{ steps.timestamp.outputs.date }}"

          sudo buildah build \
            --skip-unused-stages=false \
            --security-opt=label=disable \
            -t "${FULL_IMAGE}:${VERSION}-${DATE}" \
            -f Containerfile \
            -v $(pwd):/run/src \
            .

      - name: Aplicar Tags Adicionais
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.base_version.outputs.version }}"
          DATE="${{ steps.timestamp.outputs.date }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          SOURCE="${FULL_IMAGE}:${VERSION}-${DATE}"

          sudo buildah tag "${SOURCE}" "${FULL_IMAGE}:${VERSION}-latest"
          sudo buildah tag "${SOURCE}" "${FULL_IMAGE}:latest"
          sudo buildah tag "${SOURCE}" "${FULL_IMAGE}:main"
          sudo buildah tag "${SOURCE}" "${FULL_IMAGE}:sha-${SHORT_SHA}"

      - name: Push de Todas as Tags para o Registry
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.base_version.outputs.version }}"
          DATE="${{ steps.timestamp.outputs.date }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          for TAG in "${VERSION}-${DATE}" "${VERSION}-latest" "latest" "main" "sha-${SHORT_SHA}"; do
            echo "→ Pushing ${FULL_IMAGE}:${TAG}"
            sudo buildah push "${FULL_IMAGE}:${TAG}"
          done

      - name: Notificar Sucesso no Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Rebuild Completo Bootc concluído!
            Base: ${{ steps.base_version.outputs.version }}
            Tag Gerada: ${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}
            Repositório: ${{ github.repository }}

      - name: Notificar Falha no Telegram
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Erro no Rebuild Agendado!
            Base tentada: ${{ steps.base_version.outputs.version }}
            Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
