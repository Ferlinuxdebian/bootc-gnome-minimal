name: Build container image
on:
  schedule:
    - cron: '30 15 * * *'  # 12:30 BRT
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ferlinuxdebian/bootc-gnome-minimal

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Maximizar espaço em disco
        uses: ublue-os/remove-unwanted-software@v7

      - name: Gerar metadados do build
        id: meta
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 2 | tail -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          DATE=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PRIMARY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}-${DATE}"
          TIMESTAMP=$(git log -1 --format=%ct)

          echo "VERSION=${VERSION}"     >> $GITHUB_ENV
          echo "PRIMARY=${PRIMARY}"     >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Build da Imagem usando Podman do Hospedeiro
        id: build-image
        run: |
          # Criamos a estrutura exata exigida pelo Containerfile no hospedeiro
          sudo mkdir -p /run/src/out

          # Espelhamos /run/src para dentro do ambiente de build do Podman
          sudo podman build \
            --build-arg SOURCE_DATE_EPOCH="${{ env.TIMESTAMP }}" \
            -t "${{ env.PRIMARY }}" \
            -f Containerfile \
            -v /run/src:/run/src \
            .

      - name: Aplicar Tags Adicionais localmente
        run: |
          sudo podman tag "${{ env.PRIMARY }}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}-latest"
          sudo podman tag "${{ env.PRIMARY }}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          sudo podman tag "${{ env.PRIMARY }}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          sudo podman tag "${{ env.PRIMARY }}" "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push das imagens para o GHCR
        run: |
          # Autentica o comando sudo podman usando o token gerado pelo login-action
          sudo podman login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          
          echo "→ Enviando imagem primária..."
          sudo podman push "${{ env.PRIMARY }}"
          
          for TAG in "${{ env.VERSION }}-latest" "latest" "main" "sha-${{ env.SHORT_SHA }}"; do
            echo "→ Enviando tag: ${TAG}"
            sudo podman push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          done