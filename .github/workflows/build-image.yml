name: Build e Push da Imagem Bootc

on:
  schedule:
    - cron: '45 6 * * *'

  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Liberar MUITO espaço em disco
        run: |
          echo "Antes:"
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/swift

          sudo apt-get clean
          sudo docker system prune -af || true

          echo "Depois:"
          df -h

      - name: Extrair Versão da Imagem Base
        id: base_version
        run: |
          VERSION=$(grep '^FROM' Containerfile | head -n 1 | awk -F: '{print $2}' | awk '{print $1}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Instalar Buildah
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah fuse-overlayfs

      - name: Configurar storage overlay
        run: |
          sudo mkdir -p /etc/containers

          cat <<EOF | sudo tee /etc/containers/storage.conf
          [storage]
          driver = "overlay"

          [storage.options]
          mount_program = "/usr/bin/fuse-overlayfs"
          EOF

      - name: Login GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          sudo buildah login \
            -u "${{ github.actor }}" \
            --password-stdin \
            ${{ env.REGISTRY }}

      - name: Gerar Timestamp
        id: timestamp
        run: |
          echo "date=$(TZ='America/Sao_Paulo' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}
            type=raw,value=${{ steps.base_version.outputs.version }}-latest
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build da imagem
        run: |
          LOCAL_IMAGE=localhost/bootc-image

          sudo buildah build \
            --storage-driver=overlay \
            --format docker \
            --skip-unused-stages=false \
            --security-opt=label=disable \
            --pull \
            --no-cache \
            -t "$LOCAL_IMAGE" \
            -f Containerfile \
            -v "$(pwd):/run/src" \
            .

      - name: Push da imagem
        run: |
          LOCAL_IMAGE=localhost/bootc-image

          while read -r tag; do
            [ -z "$tag" ] && continue

            sudo buildah tag "$LOCAL_IMAGE" "$tag"

            sudo buildah push \
              --storage-driver=overlay \
              "$tag"

          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Notificar sucesso
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Rebuild Completo Bootc concluído!
            Base: ${{ steps.base_version.outputs.version }}
            Tag: ${{ steps.base_version.outputs.version }}-${{ steps.timestamp.outputs.date }}

      - name: Notificar falha
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Falha no build!
            Link:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
